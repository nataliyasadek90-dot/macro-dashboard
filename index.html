// ==================== 渲染函数 ====================

function initApp() {
  renderNav();
  renderMarket();
  renderTrigger();
  renderCal();
  renderTicker();
  loadReport(REPORTS_CONFIG[0].date);
  startClock();
}

function renderNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = REPORTS_CONFIG.map((r, i) => {
    const riskClass = r.risk === 'high' ? 'nav-risk-high' : r.risk === 'med' ? 'nav-risk-med' : 'nav-risk-low';
    const active = i === 0 ? 'active' : '';
    return `<div class="nav-item ${riskClass} ${active}" onclick="loadReport('${r.date}', this)">
      <div class="nav-date">${r.title}</div>
      <div class="nav-summary">${r.summary}</div>
    </div>`;
  }).join('');
}

function renderMarket() {
  document.getElementById('marketPanel').innerHTML = MARKET_DATA.map(m => 
    `<div class="market-row">
      <span class="market-name">${m.name}</span>
      <span><span class="market-price">${m.price}</span> <span class="market-change ${m.dir}">${m.change}</span></span>
    </div>`
  ).join('');
}

function renderTrigger() {
  document.getElementById('triggerPanel').innerHTML = TRIGGER_DATA.map(t =>
    `<div class="trigger-item">
      <span class="trigger-name">${t.name}</span>
      <span class="trigger-val ${t.level}">${t.val}</span>
    </div>`
  ).join('');
}

function renderCal() {
  document.getElementById('calPanel').innerHTML = CAL_DATA.map(c =>
    `<div class="cal-item">
      <div style="color:var(--blue);font-weight:600">${c.date} ${c.level}</div>
      <div style="margin-top:2px">${c.event}</div>
    </div>`
  ).join('');
}

function renderTicker() {
  const items = [...MARKET_DATA, ...MARKET_DATA];
  document.getElementById('ticker').innerHTML = items.map(m =>
    `<div class="ticker-item ${m.dir}"><span>${m.name}</span><span>${m.price}</span><span>${m.change}</span></div>`
  ).join('');
}

function loadReport(dateStr, navEl) {
  // 更新导航激活状态
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
  else document.querySelector('.nav-item').classList.add('active');

  // 直接从内嵌数据读取
  const content = document.getElementById('mainContent');
  const md = REPORTS_DATA[dateStr] || '';
  const cleanMd = md.replace(/^\[Nav_Summary\].*\n?/gm, '').replace(/^\n+/, '');
  content.innerHTML = `<div class="md-body">${marked.parse(cleanMd)}</div>`;
}

function startClock() {
  function update() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
  }
  update();
  setInterval(update, 1000);
}

// 启动
document.addEventListener('DOMContentLoaded', initApp);
</script>
