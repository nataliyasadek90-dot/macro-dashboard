<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoAnalyst · 全球宏观策略日报</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --accent: #f0a500; --accent2: #58a6ff;
  --text: #e6edf3; --text-muted: #8b949e;
  --red: #f85149; --green: #3fb950; --yellow: #d29922;
  --blue: #58a6ff; --panel: #1c2128;
  --up: #f85149; --down: #3fb950;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-brand { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.live-badge { background: rgba(63, 185, 80, 0.15); color: var(--green); border: 1px solid var(--green); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
.layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 52px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; max-height: calc(100vh - 52px); }
.sidebar-title { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: rgba(240, 165, 0, 0.15); border-left: 3px solid var(--accent); }
.nav-date { font-size: 0.8rem; font-weight: 600; color: var(--text); }
.nav-summary { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; line-height: 1.3; }
.nav-risk-high { border-left: 3px solid var(--red); }
.nav-risk-med { border-left: 3px solid var(--yellow); }
.nav-risk-low { border-left: 3px solid var(--green); }
.main { padding: 24px 32px; overflow-y: auto; max-height: calc(100vh - 52px); }
.report-section { display: none; }
.report-section.active { display: block; }
.report-header { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--accent); }
.report-header h1 { font-size: 1.3rem; color: var(--accent); }
.report-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
.report-body { line-height: 1.7; font-size: 0.88rem; }
.report-body h2 { font-size: 1rem; color: var(--accent2); margin: 18px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.report-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; }
.report-body th { background: var(--surface2); padding: 7px 10px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
.report-body td { padding: 7px 10px; border: 1px solid var(--border); }
.report-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.report-body pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; font-size: 0.75rem; margin: 10px 0; }
.report-body code { background: var(--surface); padding: 2px 5px; border-radius: 3px; font-size: 0.85em; }
.report-body pre code { background: none; padding: 0; }
.report-body p { margin: 8px 0; }
.report-body ul, .report-body ol { margin: 8px 0; padding-left: 20px; }
.report-body li { margin: 4px 0; }
.report-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 10px 0; }
.report-body strong { color: var(--accent); }
.highlight-red { color: var(--red); font-weight: 600; }
.highlight-green { color: var(--green); font-weight: 600; }
.highlight-yellow { color: var(--yellow); font-weight: 600; }
.highlight-blue { color: var(--blue); font-weight: 600; }
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 16px; max-height: none; }
}
</style>
</head>
<body>

let currentIdx = 0;

function renderNav() {
  const navList = document.getElementById('navList');
  navList.innerHTML = REPORTS.map((r, i) => {
    const riskClass = r.risk === 'high' ? 'nav-risk-high' : r.risk === 'med' ? 'nav-risk-med' : 'nav-risk-low';
    const activeClass = i === currentIdx ? 'active' : '';
    return `<div class="nav-item ${riskClass} ${activeClass}" onclick="showReport(${i})">
      <div class="nav-date">${r.title}（${r.weekday}）</div>
      <div class="nav-summary">${r.summary}</div>
    </div>`;
  }).join('');
}

function showReport(idx) {
  currentIdx = idx;
  const report = REPORTS[idx];
  document.getElementById('mainContent').innerHTML = `<div class="report-section active">
    <div class="report-header"><h1>${report.title}日报</h1><div class="report-meta">${report.weekday} · ${report.date}</div></div>
    <div class="report-body">${report.html}</div>
  </div>`;
  renderNav();
}

renderNav();

</body>
</html>
