name: Daily Macro Report

on:
  schedule:
    # 每天北京时间 09:00 = UTC 01:00
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Generate daily report & push Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_OPEN_ID: ${{ secrets.FEISHU_OPEN_ID }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cd $GITHUB_WORKSPACE
          python daily_report.py

      - name: Commit & push generated files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add daily_reports/
          git diff --cached --quiet || git commit -m "auto: daily report $(date +'%Y-%m-%d')"
          git push
